<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css', v='0.3') }}"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="{{ url_for('static', filename='img/favicon.ico') }}"
    />

    <title>{% block title %}{% endblock %}</title>
  </head>

  <body>
    <header id="top" class="navbar">
      <img src="{{ url_for('static', filename='img/logo_azul.png') }}" />

      <div class="navbar_hamburguer">
        <div class="navbar_hamburguer_linha"></div>
        <div class="navbar_hamburguer_linha"></div>
        <div class="navbar_hamburguer_linha"></div>
      </div>

      <nav class="navbar_menu">
        <a href="{{ url_for('home') }}" class="navbar_menu_item" id="nav_home"
          >Home</a
        >
        <a
          href="{{ url_for('servicos') }}"
          class="navbar_menu_item"
          id="nav_servicos"
          >Serviços</a
        >
        <a href="{{ url_for('sobre') }}" class="navbar_menu_item" id="nav_sobre"
          >Sobre mim</a
        >
        <a
          href="{{ url_for('formacao') }}"
          class="navbar_menu_item"
          id="nav_formacao"
          >Formação</a
        >
        <a
          href="{{ url_for('projetos') }}"
          class="navbar_menu_item"
          id="nav_projetos"
          >Projetos</a
        >
      </nav>
    </header>

    <hr class="divisoria_navbar" />

    {% block content %} {% endblock %}

    <footer id="footer">
      <div class="footer_principal">
        <div class="parte_esquerdo">
          <p>Site feito com &#x1F499; por Marco Antonio Arantes</p>
          <p>Todos os direitos reservados © 2024</p>
        </div>

        <div class="parte_direito">
          <div class="parte_direito_cima">
            <a
              href="https://www.linkedin.com/in/marco-antonio-arantes/"
              target="_blank"
            >
              <img src="{{ url_for('static', filename='img/linkedin.png') }}" />
            </a>

            <a href="https://github.com/maarantes" target="_blank">
              <img src="{{ url_for('static', filename='img/github.png') }}" />
            </a>

            <a href="https://www.behance.net/marcoaarantes" target="_blank">
              <img src="{{ url_for('static', filename='img/behance.png') }}" />
            </a>
          </div>

          <div class="botao_top">Voltar para o topo</div>
        </div>
      </div>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
